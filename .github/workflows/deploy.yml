name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Go (for Hugo Modules)
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.0'
          extended: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("blogdown","remotes"), repos="https://cloud.r-project.org")'

      - name: Install Hugo (extended)
        run: Rscript -e 'blogdown::install_hugo(version = "0.159.0", extended = TRUE, force = TRUE)'
        
      - name: Setup Node (for TailwindCSS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TailwindCSS CLI
        run: |
          npm install -g tailwindcss@latest
          tailwindcss --help >/dev/null

      - name: Build site
        env:
          HUGO_ENV: production
        run: |
          hugo version
          hugo mod get -u
          hugo mod tidy
          hugo --gc --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4